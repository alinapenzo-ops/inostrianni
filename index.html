<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>I NOSTRI ANNI</title>

  <!-- Font eleganti -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Playfair Display", serif;
      background: linear-gradient(to bottom, #f9e9ef, #f7dfe8);
      color: #5a3b4e;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    .container {
      max-width: 780px;
      background: #ffffffd9;
      padding: 60px;
      border-radius: 24px;
      box-shadow: 0 0 40px rgba(0,0,0,0.08);
      backdrop-filter: blur(6px);
      animation: fadeIn 1.2s ease;
      text-align: center;
      border: 2px solid #e8c6d3;
    }

    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: 3.8rem;
      font-weight: 500;
      letter-spacing: 0.25rem; /* SPAZIATURA ELEGANTE */
      margin-bottom: 35px;
      color: #a05c85;
      text-transform: uppercase;
    }

    p {
      white-space: pre-line;
      line-height: 1.7;
      font-size: 1.22rem;
      color: #4a2f42;
    }

    /* Petali */
    .petal {
      position: fixed;
      top: -10px;
      color: #e7b4c4;
      font-size: 22px;
      animation: fall linear infinite;
      opacity: 0.85;
      transform: rotate(15deg);
      filter: blur(0.3px);
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) translateX(0) rotate(0deg); }
      100% { transform: translateY(110vh) translateX(40px) rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
